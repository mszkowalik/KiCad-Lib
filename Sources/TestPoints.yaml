library_name: TestPoints

# Validation rules specific to test point components
defaults:
  footprint_map: {}
  ignore_packages:
    - "-"
validation_rules:
  # Test points can optionally have footprints (some are virtual)
  footprint_required: false
  # Test points typically don't have manufacturer information
  manufacturer_properties: [] # Disable manufacturer validation for test points
  required_properties: [] # Only global requirements apply

  footprint_style:
    pad_shape: roundrect         # SMD pads must use roundrect, not rect or oval
    pad_roundrect_rratio: 0.25  # rounded corner ratio for roundrect pads
    fab_line_width_mm: 0.1      # F.Fab body outline line width
    silk_line_width_mm: 0.1      # F.SilkS silkscreen line width
    crtyd_line_width_mm: 0.05  # F.CrtYd courtyard line width
    require_fab_outline: true   # must have at least one fp_line on F.Fab
    require_crtyd: true         # must have a closed F.CrtYd rectangle
    no_easyeda_prefix: true     # footprint header must not contain "easyeda2kicad:"
components:
  - name: RH-5015
    base_component: TestPoint
    properties:
      - key: Footprint
        value: 7Sigma:SMD_RH-5015
      - key: ki_description
        value: TestPoint Loop
      - key: Manufacturer 1
        value: ronghe
      - key: Manufacturer Part Number 1
        value: RH-5015
      - key: Supplier 1
        value: LCSC
      - key: Supplier Part Number 1
        value: C5199798
      - key: LCSC Part
        value: C5199798
      - key: Datasheet
        value: https://www.lcsc.com/datasheet/C5199798.pdf
  - name: TestPoint_Pad_1.5x1.5mm
    base_component: TestPoint
    properties:
      - key: Footprint
        value: 7Sigma:TestPoint_Pad_1.5x1.5mm
      - key: ki_description
        value: SMD rectangular pad as test Point, square 1.5mm side length
  - name: TestPoint_Pad_D1.5mm
    base_component: TestPoint
    properties:
      - key: Footprint
        value: 7Sigma:TestPoint_Pad_D1.5mm
      - key: ki_description
        value: SMD pad as test Point, diameter 1.5mm
