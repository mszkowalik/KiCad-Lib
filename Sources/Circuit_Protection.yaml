library_name: Circuit_Protection

# Standard package-to-footprint mapping for fuses.
# No default base_component since it varies (Polyfuse, Fuse, etc.).
defaults:
  footprint_map:
    "0805": "7Sigma:Fuse_0805_2012Metric"
    "1206": "7Sigma:Fuse_1206_3216Metric"
    "2920": "7Sigma:Fuse_2920_7451Metric"
    "Through Hole,P=22.5mm": "7Sigma:FUSE-TH_L24.4-W9.4-P22.60"

# Validation rules specific to circuit protection components
validation_rules:
  required_properties:
    - "Value"
    - "Hold Current"
    - "Trip Current"
    - "Power"
    - "Voltage_Max"
    - "Footprint"
  non_empty_properties:
    - "Value"
    - "Hold Current"
    - "Trip Current"
    - "Power"
    - "Voltage_Max"
  property_patterns:
    "Hold Current": "^[0-9]+(\\.[0-9]+)?[mµnpkMG]?A$" # Current like 5A, 500mA
    "Trip Current": "^[0-9]+(\\.[0-9]+)?[mµnpkMG]?A$" # Current like 10A
    "Power": "^[0-9]+(\\.[0-9]+)?[mµnpkMGT]?W$" # Power like 2.5W
    "Voltage_Max": "^[0-9]+(\\.[0-9]+)?V$" # Voltage like 30V

  footprint_style:
    pad_shape: roundrect         # SMD pads must use roundrect, not rect or oval
    pad_roundrect_rratio: 0.25  # rounded corner ratio for roundrect pads
    fab_line_width_mm: 0.1      # F.Fab body outline line width
    silk_line_width_mm: 0.1      # F.SilkS silkscreen line width
    crtyd_line_width_mm: 0.05  # F.CrtYd courtyard line width
    require_fab_outline: true   # must have at least one fp_line on F.Fab
    require_crtyd: true         # must have a closed F.CrtYd rectangle
    no_easyeda_prefix: true     # footprint header must not contain "easyeda2kicad:"
