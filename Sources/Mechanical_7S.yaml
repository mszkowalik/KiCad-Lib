library_name: Mechanical_7S

# Validation rules specific to mechanical components
validation_rules:
  required_properties:
    - "Value"
    - "ki_description"
    - "Footprint"
  non_empty_properties:
    - "Value"
    - "ki_description"
  manufacturer_properties: [] # Disable manufacturer validation for mechanical components

  footprint_style:
    pad_shape: roundrect         # SMD pads must use roundrect, not rect or oval
    pad_roundrect_rratio: 0.25  # rounded corner ratio for roundrect pads
    fab_line_width_mm: 0.1      # F.Fab body outline line width
    silk_line_width_mm: 0.1      # F.SilkS silkscreen line width
    crtyd_line_width_mm: 0.05  # F.CrtYd courtyard line width
    require_fab_outline: true   # must have at least one fp_line on F.Fab
    require_crtyd: true         # must have a closed F.CrtYd rectangle
    no_easyeda_prefix: true     # footprint header must not contain "easyeda2kicad:"
    exempt_base_components:     # skip F.Fab/F.CrtYd presence + width rules for these
      - Enclosure               # Hammond/etc. enclosure footprints are mechanical placeholders
components:
  - name: 7Sigma_Logo
    base_component: 7Sigma_Logo_Base
    properties:
      - key: Reference
        value: "G"
      - key: Value
        value: "7Sigma Logo"
      - key: Footprint
        value: "7Sigma:7Sigma_Logo"
      - key: ki_keywords
        value: "logo graphic symbol"
      - key: ki_description
        value: "7Sigma company logo graphic symbol"
      - key: Manufacturer
        value:
      - key: Manufacturer Part Number
        value:
  - name: MH_2.5mm_4mm_OD
    base_component: MountingHole_Pad
    properties:
      - key: Reference
        value: "H"
      - key: Value
        value: "MH_2.5mm_4mm_OD"
      - key: Footprint
        value: "7Sigma:MountingHole_2.5mm_Pad_4mm"
      - key: ki_keywords
        value: "mounting hole pad"
      - key: ki_description
        value: "Mounting hole with pad, 2.5mm drill, 4mm outer diameter"

  - name: MH_M3_3.2mm_6mm_OD
    base_component: MountingHole_Pad
    properties:
      - key: Reference
        value: "H"
      - key: Value
        value: "MH_M3_3.2mm_6mm_OD"
      - key: Footprint
        value: "7Sigma:MountingHole_3.2mm_M3_Pad_6mm"
      - key: ki_keywords
        value: "mounting hole pad M3"
      - key: ki_description
        value: "Mounting hole with pad, M3, 3.2mm drill, 6mm outer diameter"

  - name: Hammond_1551RFLGY
    base_component: Enclosure
    properties:
      - key: Reference
        value: "ENC"
      - key: Value
        value: Hammond_1551RFLGY
      - key: Footprint
        value: 7Sigma:HAMMOND_1551RFLGY
      - key: ki_keywords
        value: "hammond enclosure case housing mechanical"
      - key: ki_description
        value: "Hammond 1551RFLGY translucent grey flame retardant polycarbonate enclosure"

  - name: Hammond_1556CGY
    base_component: Enclosure
    properties:
      - key: Reference
        value: "ENC"
      - key: Value
        value: Hammond_1556CGY
      - key: Footprint
        value: 7Sigma:HAMMOND_1556CGY
      - key: ki_keywords
        value: "hammond enclosure case housing mechanical"
      - key: ki_description
        value: "Hammond 1556CGY grey ABS general purpose enclosure, 120 x 80 x 45 mm"
